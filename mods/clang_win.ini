[constants]
vcpkg_triplet = 'x86-windows-static-custom-clang'

[binaries]
c = ['clang-cl', '-m32', '-msse3', '-fuse-ld=lld', '--target=i686-pc-windows-msvc']
cpp = ['clang-cl', '-m32', '-msse3', '-fuse-ld=lld', '--target=i686-pc-windows-msvc']
ar = 'llvm-lib'
strip = 'llvm-strip'
windres = 'llvm-rc'

[project options]
vcpkg_triplet = vcpkg_triplet
